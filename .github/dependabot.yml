# Dependabot version + security updates, grouped per ecosystem.
# One PR per ecosystem per update-type instead of one PR per package.
version: 2
updates:
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: monthly
    time: "09:00"
    timezone: America/Los_Angeles
  labels:
  - dependencies
  groups:
    github-actions-version:
      applies-to: version-updates
      patterns:
      - '*'
    github-actions-security:
      applies-to: security-updates
      patterns:
      - '*'
- package-ecosystem: pip
  directories:
  - /
  - /scripts
  allow:
  - dependency-type: direct
  - dependency-type: indirect
  ignore:
  - dependency-name: pydantic
    update-types:
    - version-update:semver-major
  - dependency-name: httpx
    update-types:
    - version-update:semver-major
  schedule:
    interval: monthly
    time: "09:00"
    timezone: America/Los_Angeles
  labels:
  - dependencies
  groups:
    pip-version:
      applies-to: version-updates
      patterns:
      - '*'
    pip-security:
      applies-to: security-updates
      patterns:
      - '*'
- package-ecosystem: docker
  directory: /
  schedule:
    interval: monthly
    time: "09:00"
    timezone: America/Los_Angeles
  labels:
  - dependencies
  groups:
    docker-version:
      applies-to: version-updates
      patterns:
      - '*'
    docker-security:
      applies-to: security-updates
      patterns:
      - '*'
- package-ecosystem: docker-compose
  directory: /
  schedule:
    interval: monthly
    time: "09:00"
    timezone: America/Los_Angeles
  labels:
  - dependencies
  groups:
    docker-compose-version:
      applies-to: version-updates
      patterns:
      - '*'
    docker-compose-security:
      applies-to: security-updates
      patterns:
      - '*'
