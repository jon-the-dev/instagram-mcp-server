# Dependabot updates are grouped into one monthly version-update PR across ecosystems.
# Security updates are grouped per ecosystem where GitHub supports grouped security updates.
version: 2
multi-ecosystem-groups:
  monthly-dependencies:
    schedule:
      interval: monthly
      time: 09:00
      timezone: America/Los_Angeles
    labels:
    - dependencies
updates:
- package-ecosystem: github-actions
  directory: /
  patterns:
  - '*'
  multi-ecosystem-group: monthly-dependencies
  groups:
    github-actions-security:
      applies-to: security-updates
      patterns:
      - '*'
- package-ecosystem: pip
  directories:
  - /
  - /scripts
  patterns:
  - '*'
  multi-ecosystem-group: monthly-dependencies
  groups:
    pip-security:
      applies-to: security-updates
      patterns:
      - '*'
  allow:
  - dependency-type: direct
  - dependency-type: indirect
  ignore:
  - dependency-name: pydantic
    update-types:
    - version-update:semver-major
  - dependency-name: httpx
    update-types:
    - version-update:semver-major
- package-ecosystem: docker
  directory: /
  patterns:
  - '*'
  multi-ecosystem-group: monthly-dependencies
  groups:
    docker-security:
      applies-to: security-updates
      patterns:
      - '*'
- package-ecosystem: docker-compose
  directory: /
  patterns:
  - '*'
  multi-ecosystem-group: monthly-dependencies
  groups:
    docker-compose-security:
      applies-to: security-updates
      patterns:
      - '*'
